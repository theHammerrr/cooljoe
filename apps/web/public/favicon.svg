<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="7" fill="#0d1117"/>
  <!-- Database cylinder body -->
  <!-- Top ellipse -->
  <ellipse cx="16" cy="9" rx="8" ry="3" fill="none" stroke="#4ade80" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Left side line -->
  <line x1="8" y1="9" x2="8" y2="23" stroke="#4ade80" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Right side line -->
  <line x1="24" y1="9" x2="24" y2="23" stroke="#4ade80" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Bottom ellipse -->
  <ellipse cx="16" cy="23" rx="8" ry="3" fill="none" stroke="#4ade80" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Middle row line -->
  <path d="M8 16 Q16 18.5 24 16" fill="none" stroke="#4ade80" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Lightning bolt overlay (white/bright) -->
  <polyline points="18,7 13,16 17,16 14,25" fill="none" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
