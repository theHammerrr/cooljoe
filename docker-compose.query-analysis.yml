version: '3.8'

services:
  # Internal Application Database with Vector Support
  db:
    image: ankane/pgvector:latest
    environment:
      POSTGRES_USER: copilot_admin
      POSTGRES_PASSWORD: secure_password
      POSTGRES_DB: db_copilot
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U copilot_admin -d db_copilot"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Seeded target database for query-analysis validation
  fixture-db:
    image: postgres:16
    environment:
      POSTGRES_USER: fixture_admin
      POSTGRES_PASSWORD: fixture_password
      POSTGRES_DB: query_analysis_lab
    ports:
      - "5434:5432"
    volumes:
      - ./dev/query-analysis-fixtures/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fixture_admin -d query_analysis_lab"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Typescript Database Copilot Backend, pointed at the seeded target DB by default
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DATABASE_URL: "postgresql://copilot_admin:secure_password@db:5432/db_copilot"
      PROJECT_DATABASE_URL: ${PROJECT_DATABASE_URL:-postgresql://fixture_admin:fixture_password@fixture-db:5432/query_analysis_lab}
      TARGET_DATABASE_URL: ${TARGET_DATABASE_URL:-}
      AI_PROVIDER: ${AI_PROVIDER:-ollama}
      AI_MODEL: ${AI_MODEL:-gpt-4o}
      AI_EMBEDDING_MODEL: ${AI_EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      TABLE_ALLOWLIST: qa_customers,qa_orders,qa_line_items,qa_events,qa_tiny_lookup
      CLIENT_URL: "http://localhost:3000"
    depends_on:
      db:
        condition: service_healthy
      fixture-db:
        condition: service_healthy

  # Frontend React Deployment (NGINX)
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: "http://localhost:3001"
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  db_data:
